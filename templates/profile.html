<!DOCTYPE html>
<html>
<head>
<link rel="stylesheet" href="/static/style.css">
</head>
<body>

<div class="card profile">
{% if user.avatar %}
<img class="avatarbig" src="/static/avatars/{{user.avatar}}">
{% endif %}
<h2>{{user.login}}</h2>
</div>

<div class="posts">
{% for post in posts %}
<div class="card">
<h3>{{post.title}}</h3>
<p>{{post.content}}</p>
</div>
{% endfor %}
</div>

</body>
</html>
